body {
  font-family: 'Zen Maru Gothic', sans-serif;
  background: #fdf8f3;
  min-height: 100vh;
}

.app {
  min-height: 100vh;
  background: linear-gradient(135deg, #fdf8f3 0%, #fce9d8 50%, #fdf0e8 100%);
  padding: 32px 16px 64px;
  position: relative;
  overflow: hidden;
}

.app::before {
  content: '';
  position: fixed;
  top: -200px; right: -200px;
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(255,180,130,0.2) 0%, transparent 70%);
  pointer-events: none;
}

.app::after {
  content: '';
  position: fixed;
  bottom: -200px; left: -200px;
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(180,140,255,0.1) 0%, transparent 70%);
  pointer-events: none;
}

.container {
  max-width: 520px;
  margin: 0 auto;
  position: relative;
  z-index: 1;
}

.header { text-align: center; margin-bottom: 32px; }

.header-emoji {
  font-size: 48px;
  display: block;
  margin-bottom: 8px;
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

.header h1 {
  font-family: 'Noto Serif JP', serif;
  font-size: 22px;
  color: #4a3728;
  letter-spacing: 0.05em;
  font-weight: 600;
}

.header p { font-size: 13px; color: #9b7a6a; margin-top: 6px; }

.card {
  background: rgba(255,255,255,0.75);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,200,160,0.4);
  border-radius: 24px;
  padding: 28px 24px;
  margin-bottom: 16px;

}

.section-label {
  font-size: 12px;
  font-weight: 700;
  color: #c87840;
  letter-spacing: 0.12em;
  margin-bottom: 14px;
}

.chips { display: flex; flex-wrap: wrap; gap: 8px; }

.chip {

  background: rgba(255,255,255,0.6);

}

.chip:hover { border-color: #c87840; background: rgba(200,120,60,0.08); }

}

}

  width: 100%;

  background: linear-gradient(135deg, #c87840 0%, #e0935a 100%);
  color: white;
  border: none;
  border-radius: 18px;

  transform: translateY(-2px);
  box-shadow: 0 6px 28px rgba(200,120,60,0.45);
}

.dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes bounce {
  0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }

}

  border: 1.5px solid rgba(200,120,60,0.3);

  padding: 28px 24px;
  margin-bottom: 16px;

}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.result-header { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 16px; }
.result-icon { font-size: 36px; flex-shrink: 0; line-height: 1; }

.result-title-wrap h2 {
  font-family: 'Noto Serif JP', serif;
  font-size: 18px;
  color: #3a2a1e;
  font-weight: 600;
  margin-bottom: 4px;
}

.result-tag {
  font-size: 11px;
  color: #c87840;
  font-weight: 700;
  letter-spacing: 0.1em;
  background: rgba(200,120,60,0.1);
  padding: 2px 10px;
  border-radius: 100px;
  display: inline-block;
}

.result-desc {
  font-size: 13.5px;
  color: #5a3e30;
  line-height: 1.75;
  margin-bottom: 16px;
  white-space: pre-wrap;
}

.result-point {
  font-size: 12px;
  color: #c87840;
  margin-bottom: 12px;

}

.meta-badge {
  font-size: 12px;
  color: #7a5a48;
  background: rgba(200,120,60,0.08);
  border: 1px solid rgba(200,120,60,0.2);

  border-radius: 100px;
}

.retry-btn {
  width: 100%;

  background: transparent;
  color: #c87840;

  text-align: center;

  padding: 16px;
  background: rgba(255,200,200,0.3);
  border-radius: 14px;
  margin-top: 8px;
}

.hidden { display: none; }

  </div>

  <script>
    const LS_KEY = "gemini_api_key";
    const BUDGET_STEPS = [0, 500, 1000, 2000, 3000, 5000, 10000, 20000, 50000];

    const state = {
      weather: "",
      mood: "",
      distance: "",
      apiKey: localStorage.getItem(LS_KEY) || "",
    };

    const WEATHER = [
      { label: "☀️ 晴れ", value: "晴れ" },
      { label: "🌤 曇り", value: "曇り" },
      { label: "🌧 雨", value: "雨" },
      { label: "❄️ 雪・寒い", value: "雪・寒い" },
    ];
    const MOOD = [
      { label: "🧘 まったり", value: "まったり" },
      { label: "🏃 アクティブ", value: "アクティブ" },
      { label: "🍴 食いしん坊", value: "食べること重視" },
      { label: "🎮 インドア", value: "インドア" },
      { label: "🌿 自然・癒し", value: "自然・癒し" },
      { label: "🛍 買い物", value: "ショッピング" },
    ];
    const DISTANCE = [
      { label: "🏠 家でOK", value: "家・近所" },
      { label: "🚗 30分圏内", value: "30分以内" },
      { label: "🚄 遠出もOK", value: "遠出・1〜2時間" },
    ];

    function formatBudget(val) {
      if (val === 0) return "0円（無料）";
      if (val >= 10000) return (val / 10000).toFixed(val % 10000 === 0 ? 0 : 1) + "万円";
      return val.toLocaleString() + "円";
    }

    function buildChips(containerId, options, stateKey) {
      const el = document.getElementById(containerId);
      el.innerHTML = options.map(o =>
        `<button class="chip" data-value="${o.value}" onclick="selectChip('${containerId}','${stateKey}',this,'${o.value}')">${o.label}</button>`
      ).join("");
    }

    function selectChip(containerId, stateKey, btn, value) {
      document.querySelectorAll(`#${containerId} .chip`).forEach(b => b.classList.remove("selected"));
      btn.classList.add("selected");
      state[stateKey] = value;
      updateSubmitBtn();
    }

    function updateBudget() {
      const idx = document.getElementById("budget-slider").value;
      const val = BUDGET_STEPS[idx];
      document.getElementById("budget-display").textContent = formatBudget(val);
      // スライダーのグラデーション更新
      const pct = (idx / 8) * 100;
      const slider = document.getElementById("budget-slider");
      slider.style.background = `linear-gradient(to right, #c87840 0%, #c87840 ${pct}%, #e8d4c4 ${pct}%, #e8d4c4 100%)`;
    }

    function updateSubmitBtn() {
      const btn = document.getElementById("submit-btn");
      const ok = state.apiKey && state.weather && state.mood && state.distance;
      btn.disabled = !ok;
      btn.textContent = !state.apiKey ? "🔑 まずAPIキーを設定してください" : "✨ 提案してもらう";
    }

    function saveKey() {
      const k = document.getElementById("api-key-input").value.trim();
      if (!k) return;
      localStorage.setItem(LS_KEY, k);
      state.apiKey = k;
      document.getElementById("key-input-area").classList.add("hidden");
      document.getElementById("key-set-area").classList.remove("hidden");
      updateSubmitBtn();
    }

    function clearKey() {
      localStorage.removeItem(LS_KEY);
      state.apiKey = "";
      document.getElementById("api-key-input").value = "";
      document.getElementById("key-input-area").classList.remove("hidden");
      document.getElementById("key-set-area").classList.add("hidden");
      updateSubmitBtn();
    }

    async function handleSubmit() {
      const idx = document.getElementById("budget-slider").value;
      const budget = BUDGET_STEPS[idx];
      const note = document.getElementById("note-input").value;

      document.getElementById("loading-area").classList.remove("hidden");
      document.getElementById("error-area").classList.add("hidden");
      document.getElementById("submit-btn").disabled = true;

      const prompt = `あなたは2人（カップル）の休日プランを提案するアシスタントです。
以下の条件を踏まえて、2人が楽しめるプランを3つ提案してください。

条件:
- 天気: ${state.weather}
- 気分・スタイル: ${state.mood}
- 移動距離: ${state.distance}
- 予算（2人合計目安）: ${formatBudget(budget)}
- その他メモ: ${note || "特になし"}

出力形式: 必ずJSON配列のみ返してください。前後の説明文やMarkdownコードブロック不要。
[
  {
    "icon": "絵文字1つ",
    "title": "プラン名（15文字以内）",
    "tag": "カテゴリ（例: おでかけ / おうち / グルメ / アクティブ）",
    "description": "2〜3文で具体的な楽しみ方や場所のイメージ。高槻・大阪エリアに合わせてリアルな提案で。",
    "cost": "費用感（例: 2人で約3,000円）",
    "time": "所要時間（例: 半日）",
    "point": "2人向けのこだわりポイントひとこと"
  }
]`;

      try {
        const res = await fetch(
          `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite-preview:generateContent?key=${state.apiKey}`,
          {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              contents: [{ parts: [{ text: prompt }] }],
              generationConfig: { temperature: 0.9, maxOutputTokens: 1000 },
            }),
          }
        );
        const data = await res.json();
        if (data.error) throw new Error(data.error.message || "API_KEY");
        const text = data.candidates?.[0]?.content?.parts?.[0]?.text || "";
        const clean = text.replace(/```json|```/g, "").trim();
        const results = JSON.parse(clean);
        showResults(results);
      } catch (e) {
        const errEl = document.getElementById("error-area");
        errEl.textContent = e.message?.includes("key") || e.message?.includes("API_KEY")
          ? "APIキーが無効です。正しいキーを設定してください。"
          : "提案の取得に失敗しました。もう一度試してみてください。";
        errEl.classList.remove("hidden");
      } finally {
        document.getElementById("loading-area").classList.add("hidden");
        updateSubmitBtn();
      }
    }

    function showResults(results) {
      document.getElementById("form-area").classList.add("hidden");
      const area = document.getElementById("result-area");
      const cards = document.getElementById("result-cards");
      cards.innerHTML = results.map(r => `
        <div class="result-card">
          <div class="result-header">
            <span class="result-icon">${r.icon}</span>
            <div class="result-title-wrap">
              <h2>${r.title}</h2>
              <span class="result-tag">${r.tag}</span>
            </div>
          </div>
          <div class="result-desc">${r.description}</div>
          ${r.point ? `<div class="result-point">💡 ${r.point}</div>` : ""}
          <div class="result-meta">
            ${r.cost ? `<span class="meta-badge">💰 ${r.cost}</span>` : ""}
            ${r.time ? `<span class="meta-badge">⏱ ${r.time}</span>` : ""}
          </div>
        </div>
      `).join("");
      area.classList.remove("hidden");
    }

    function resetForm() {
      document.getElementById("result-area").classList.add("hidden");
      document.getElementById("form-area").classList.remove("hidden");
    }

    // 初期化
    buildChips("weather-chips", WEATHER, "weather");
    buildChips("mood-chips", MOOD, "mood");
    buildChips("distance-chips", DISTANCE, "distance");
    updateBudget();

    if (state.apiKey) {
      document.getElementById("key-input-area").classList.add("hidden");
      document.getElementById("key-set-area").classList.remove("hidden");
    }

    // Enterキーでキー保存
    document.getElementById("api-key-input").addEventListener("keydown", e => {
      if (e.key === "Enter") saveKey();
    });

    updateSubmitBtn();
  </script>

</body>
