}
function selChip(id, key, btn, val) {
  document.querySelectorAll(`#${id} .chip`).forEach(b=>b.classList.remove("selected"));
  btn.classList.add("selected");
  state[key]=val; updateSubmitBtn();
}

function buildPrefChips() {
  document.getElementById("loc-pref-chips").innerHTML = PREFS.map(p=>
    `<button class="chip" onclick="selLocChip(this,'${p}')">${p}</button>`
  ).join("");
}
function selLocChip(btn, val) {
  document.querySelectorAll("#loc-area-chips .chip,#loc-pref-chips .chip").forEach(b=>b.classList.remove("selected"));
  btn.classList.add("selected");
  state.location=val; updateSubmitBtn();
}

function switchLocMode(mode) {
  state.locMode=mode; state.location="";
  document.querySelectorAll(".loc-tab").forEach((b,i)=>b.classList.toggle("active",["area","pref","free"][i]===mode));
  document.getElementById("loc-area-chips").classList.toggle("hidden",mode!=="area");
  document.getElementById("loc-pref-chips").classList.toggle("hidden",mode!=="pref");
  document.getElementById("loc-free-wrap").classList.toggle("hidden",mode!=="free");
  document.querySelectorAll("#loc-area-chips .chip,#loc-pref-chips .chip").forEach(b=>b.classList.remove("selected"));
  if(mode==="free") state.location=document.getElementById("loc-free-input").value;
  updateSubmitBtn();
}

function updateBudget() {
  const idx=document.getElementById("budget-slider").value;
  document.getElementById("budget-display").textContent=formatBudget(BUDGET_STEPS[idx]);
  const pct=(idx/8)*100;
  document.getElementById("budget-slider").style.background=`linear-gradient(to right,#c87840 ${pct}%,#e8d4c4 ${pct}%)`;
}
function updateCount() { document.getElementById("count-display").textContent=document.getElementById("count-slider").value+"件"; }
function formatBudget(v) {
  if(v===0)return"0円（無料）";
  if(v>=10000)return(v/10000).toFixed(v%10000===0?0:1)+"万円";
  return v.toLocaleString()+"円";
}

async function autoWeather() {
  const btn=document.getElementById("weather-auto-btn");
  btn.textContent="取得中…";
  try {
    const pos=await new Promise((res,rej)=>navigator.geolocation.getCurrentPosition(res,rej,{timeout:6000}));
    const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${pos.coords.latitude}&longitude=${pos.coords.longitude}&current=weathercode&timezone=Asia%2FTokyo`);
    const d=await r.json();
    const code=d.current.weathercode;
    let w="晴れ";
    if(code>=71&&code<=77)w="雪・寒い";
    else if(code>=51&&code<=67)w="雨";
    else if(code>=1&&code<=3)w="曇り";
    document.querySelectorAll("#weather-chips .chip").forEach(b=>{
      const match=b.textContent.includes(w);
      b.classList.toggle("selected",match);
      if(match)state.weather=w;
    });
    updateSubmitBtn(); showToast("📡 天気を取得しました："+w);
  } catch(e){ showToast("位置情報の取得に失敗しました"); }
  btn.textContent="📡 自動取得";
}

function saveKey() {
  const k=document.getElementById("api-key-input").value.trim(); if(!k)return;
  localStorage.setItem(LS_KEY,k); state.apiKey=k;
  document.getElementById("key-input-area").classList.add("hidden");
  document.getElementById("key-set-area").classList.remove("hidden");
  updateSubmitBtn();
}
function clearKey() {
  localStorage.removeItem(LS_KEY); state.apiKey="";
  document.getElementById("api-key-input").value="";
  document.getElementById("key-input-area").classList.remove("hidden");
  document.getElementById("key-set-area").classList.add("hidden");
  updateSubmitBtn();
}
document.getElementById("api-key-input").addEventListener("keydown",e=>{if(e.key==="Enter")saveKey();});

function updateSubmitBtn() {
  const locOk = state.location || (state.locMode==="free"&&document.getElementById("loc-free-input").value.trim());
  const ok=state.apiKey&&state.weather&&state.mood&&state.travel&&state.availTime&&locOk;
  document.getElementById("submit-btn").disabled=!ok;
  document.getElementById("rand-btn").disabled=!ok;
  document.getElementById("submit-btn").textContent=!state.apiKey?"🔑 まずAPIキーを設定":"✨ 提案してもらう";
}

document.getElementById("loc-free-input").addEventListener("input",function(){
  state.location=this.value.trim(); updateSubmitBtn();
});

async function callAI(prompt) {
  const res=await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite-preview:generateContent?key=${state.apiKey}`,
    {method:"POST",headers:{"Content-Type":"application/json"},
     body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{temperature:0.95,maxOutputTokens:8000}})}
  );
  const data=await res.json();
  if(data.error)throw new Error(data.error.message||"API_KEY");
  const text=data.candidates?.[0]?.content?.parts?.[0]?.text||"";
  return JSON.parse(text.replace(/```json|```/g,"").trim());
}

function buildPrompt(count, extra="") {
  const budget=formatBudget(BUDGET_STEPS[document.getElementById("budget-slider").value]);
  const note=document.getElementById("note-input").value;
  const loc=state.location||(document.getElementById("loc-free-input").value.trim());
  return `あなたは2人（カップル）の休日プランを提案するアシスタントです。
以下の条件でバリエーション豊かなプランを${count}つ提案してください。似たプランは避けること。${extra}

条件:
- 出発地・エリア: ${loc}
- 天気: ${state.weather}
- 気分: ${state.mood}
- 片道移動時間: ${state.travel}
- 使える時間: ${state.availTime}
- 予算（2人合計）: ${budget}
- メモ: ${note||"特になし"}

出力: JSON配列のみ。コードブロック・説明文不要。
[{"icon":"絵文字1つ","title":"プラン名15文字以内","tag":"カテゴリ","description":"2〜3文で具体的な場所名と内容","cost":"費用感","time":"所要時間","point":"2人向けポイント"}]`;
}

async function handleSubmit() {
  const count=document.getElementById("count-slider").value;
  setLoading(true,`${count}件のプランを考え中…`);
  try { const r=await callAI(buildPrompt(count)); saveHistory(); showResults(r); }
  catch(e){ showErr(e); } finally{ setLoading(false); }
}

async function handleRandom() {
  setLoading(true,"🎲 ランダムプランを決定中…");
  try { const r=await callAI(buildPrompt(1,"サプライズ感のある意外な提案を1つ。")); saveHistory(); showResults(r,true); }
  catch(e){ showErr(e); } finally{ setLoading(false); }
}

function setLoading(on,msg="") {
  document.getElementById("loading-area").classList.toggle("hidden",!on);
  document.getElementById("loading-text").textContent=msg;
  document.getElementById("error-area").classList.add("hidden");
  document.getElementById("submit-btn").disabled=on;
  document.getElementById("rand-btn").disabled=on;
}
function showErr(e) {
  const el=document.getElementById("error-area");
  el.textContent=(e.message?.includes("key")||e.message?.includes("API_KEY"))
    ?"APIキーが無効です。正しいキーを設定してください。"
    :"提案の取得に失敗しました。もう一度お試しください。";
  el.classList.remove("hidden");
}

function showResults(results,isRand=false) {
  document.getElementById("form-area").classList.add("hidden");
  const loc=state.location||(document.getElementById("loc-free-input").value.trim());
  document.getElementById("result-cards").innerHTML=results.map((r,i)=>{
    const esc=s=>(s||"").replace(/\\/g,"\\\\").replace(/'/g,"\\'").replace(/\n/g,"\\n").replace(/"/g,"&quot;");
    const rj=esc(JSON.stringify({...r,location:loc}));
    return `
    <div class="result-card" style="animation-delay:${i*.05}s">
      <div class="result-header">
        <span class="result-icon">${r.icon}</span>
        <div class="result-title-wrap">
          <h2>${r.title}</h2>
          <span class="result-tag">${r.tag}</span>
        </div>
        <button class="fav-btn" id="fb${i}" onclick="toggleFav(${i},'${rj}')">${isFav(r.title)?"❤️":"🤍"}</button>
      </div>
      <div class="result-desc">${r.description}</div>
      ${r.point?`<div class="result-point">💡 ${r.point}</div>`:""}
      <div class="result-meta">
        ${r.cost?`<span class="meta-badge">💰 ${r.cost}</span>`:""}
        ${r.time?`<span class="meta-badge">⏱ ${r.time}</span>`:""}
        <span class="meta-badge">📍 ${loc}</span>
      </div>
      <div class="card-actions">
        <button class="share-btn" onclick="shareCard('${esc(r.icon)}','${esc(r.title)}','${esc(r.description)}','${esc(r.cost||"")}','${esc(r.time||"")}','${esc(r.point||"")}')">📤 共有</button>
        <button class="cal-btn" onclick="addCal('${esc(r.title)}','${esc(r.description)}')">📅 予定追加</button>
      </div>
    </div>`;
  }).join("");
  document.getElementById("result-area").classList.remove("hidden");
  if(isRand)showToast("🎲 ランダムプランが決まりました！");
}
function resetForm() {
  document.getElementById("result-area").classList.add("hidden");
  document.getElementById("form-area").classList.remove("hidden");
}

function getFavs(){try{return JSON.parse(localStorage.getItem(FAV_KEY)||"[]")}catch{return[]}}
function setFavs(f){localStorage.setItem(FAV_KEY,JSON.stringify(f));}
function isFav(t){return getFavs().some(f=>f.title===t);}
function toggleFav(i,rj) {
  const r=JSON.parse(rj.replace(/&quot;/g,'"'));
  let favs=getFavs(); const btn=document.getElementById(`fb${i}`);
  if(favs.some(f=>f.title===r.title)){
    favs=favs.filter(f=>f.title!==r.title); btn.textContent="🤍"; showToast("お気に入りから削除しました");
  } else {
    favs.unshift({...r,savedAt:new Date().toLocaleDateString("ja-JP")}); btn.textContent="❤️"; showToast("❤️ お気に入りに追加！");
  }
  setFavs(favs);
}

function renderFavs() {
  const favs=getFavs(); const el=document.getElementById("fav-list");
  if(!favs.length){el.innerHTML=`<div class="fav-empty"><span>🤍</span>まだお気に入りがありません<br>プランのハートを押して保存しよう！</div>`;return;}
  el.innerHTML=favs.map((r,i)=>{
    const esc=s=>(s||"").replace(/\\/g,"\\\\").replace(/'/g,"\\'").replace(/\n/g,"\\n");
    return `
    <div class="fav-card">
      <div class="fav-card-header">
        <span class="fav-card-icon">${r.icon}</span>
        <div><div class="fav-card-title">${r.title}</div><span class="fav-card-tag">${r.tag}</span></div>
      </div>
      <div class="fav-card-desc">${r.description}</div>
      ${r.point?`<div class="result-point" style="margin-bottom:8px">💡 ${r.point}</div>`:""}
      <div class="result-meta" style="margin-bottom:9px">
        ${r.cost?`<span class="meta-badge">💰 ${r.cost}</span>`:""}
        ${r.time?`<span class="meta-badge">⏱ ${r.time}</span>`:""}
        ${r.location?`<span class="meta-badge">📍 ${r.location}</span>`:""}
        <span class="meta-badge">📅 ${r.savedAt||""}</span>
      </div>
      <div class="card-actions">
        <button class="share-btn" onclick="shareCard('${esc(r.icon)}','${esc(r.title)}','${esc(r.description)}','${esc(r.cost||"")}','${esc(r.time||"")}','${esc(r.point||"")}')">📤 共有</button>
        <button class="cal-btn" onclick="addCal('${esc(r.title)}','${esc(r.description)}')">📅 予定追加</button>
        <button class="fav-remove-btn" onclick="rmFav(${i})">🗑</button>
      </div>
    </div>`;
  }).join("");
}
function rmFav(i){const f=getFavs();f.splice(i,1);setFavs(f);renderFavs();showToast("削除しました");}

function getHist(){try{return JSON.parse(localStorage.getItem(HIST_KEY)||"[]")}catch{return[]}}
function saveHistory(){
  const loc=state.location||(document.getElementById("loc-free-input").value.trim());
  const hist=getHist();
  hist.unshift({date:new Date().toLocaleDateString("ja-JP"),location:loc,weather:state.weather,mood:state.mood,travel:state.travel,time:state.availTime});
  localStorage.setItem(HIST_KEY,JSON.stringify(hist.slice(0,30)));
}
function renderHist(){
  const hist=getHist(); const el=document.getElementById("history-list");
  if(!hist.length){el.innerHTML=`<div class="fav-empty"><span>🕐</span>まだ検索履歴がありません</div>`;return;}
  el.innerHTML=hist.map((h,i)=>`
    <div class="history-item" onclick="restoreHist(${i})">
      <div class="history-meta">${h.date} · ${h.location} <span style="float:right;color:#c87840;font-size:11px">タップで復元</span></div>
      <div class="history-tags">
        <span class="history-tag">${h.weather}</span>
        <span class="history-tag">${h.mood}</span>
        <span class="history-tag">${h.travel}</span>
        <span class="history-tag">${h.time}</span>
      </div>
    </div>`).join("");
}
function restoreHist(i){
  const h=getHist()[i];
  switchLocMode("free");
  document.getElementById("loc-free-input").value=h.location; state.location=h.location;
  document.querySelectorAll("#weather-chips .chip,#mood-chips .chip,#travel-chips .chip,#time-chips .chip").forEach(b=>b.classList.remove("selected"));
  const sel=(id,val)=>{ document.querySelectorAll(`#${id} .chip`).forEach(b=>{if(b.textContent.includes(val)||val.includes(b.textContent.replace(/[^\u3040-\u30ff\u3400-\u4dbf\u4e00-\u9fff\uff00-\uffef\w]/g,"").trim()))b.classList.add("selected");}); };
  sel("weather-chips",h.weather); state.weather=h.weather;
  sel("mood-chips",h.mood); state.mood=h.mood;
  sel("travel-chips",h.travel); state.travel=h.travel;
  sel("time-chips",h.time); state.availTime=h.time;
  updateSubmitBtn(); switchTab("planner"); showToast("📋 条件を復元しました");
}

function shareCard(icon,title,desc,cost,time,point){
  const text=[icon+" "+title,desc,point?"💡 "+point:"",cost?"💰 "+cost:"",time?"⏱ "+time:""].filter(Boolean).join("\n");
  if(navigator.share)navigator.share({text});
  else navigator.clipboard.writeText(text).then(()=>showToast("📋 コピーしました！"));
}
function addCal(title,desc){
  const today=new Date(); const ymd=today.toISOString().split("T")[0].replace(/-/g,"");
  window.open(`https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(title)}&details=${encodeURIComponent(desc)}&dates=${ymd}/${ymd}`,"_blank");
}

function switchTab(tab){
  ["planner","favorites","history"].forEach((t,i)=>{
    document.getElementById("tab-"+t).classList.toggle("hidden",t!==tab);
    document.querySelectorAll(".tab-btn")[i].classList.toggle("active",t===tab);
  });
  if(tab==="favorites")renderFavs();
  if(tab==="history")renderHist();
}

function showToast(msg){
  const t=document.getElementById("copy-toast"); t.textContent=msg; t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2300);
}

// 初期化
buildChips("weather-chips",WEATHER,"weather");
buildChips("mood-chips",MOOD,"mood");
buildChips("travel-chips",TRAVEL,"travel");
buildChips("time-chips",TIME,"availTime");

// エリアチップ（カスタムクリック）
document.getElementById("loc-area-chips").innerHTML=AREAS.map(a=>
  `<button class="chip" onclick="selArea(this,'${a.value.replace(/'/g,"&apos;")}')">${a.label}</button>`
).join("");
function selArea(btn,val){
  document.querySelectorAll("#loc-area-chips .chip,#loc-pref-chips .chip").forEach(b=>b.classList.remove("selected"));
  btn.classList.add("selected"); state.location=val; updateSubmitBtn();
}

buildPrefChips();
updateBudget(); updateCount();

if(state.apiKey){
  document.getElementById("key-input-area").classList.add("hidden");
  document.getElementById("key-set-area").classList.remove("hidden");
}
updateSubmitBtn();
</script>
